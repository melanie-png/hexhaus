<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HEXHAUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"></noscript>
<script src="https://cdn.jsdelivr.net/npm/babylonjs@7.35.0/babylon.js"></script>
<script src="https://cdn.jsdelivr.net/npm/babylonjs-gui@7.35.0/babylon.gui.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="load-inner">
    <div class="load-symbol">⬡</div>
    <div class="load-title">HEXHAUS</div>
    <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
    <div class="load-text" id="load-text">Entering the house…</div>
  </div>
</div>

<!-- TITLE SCREEN -->
<div id="title-screen" class="hidden">
  <div class="title-candles">
    <span class="tc">🕯️</span><span class="tc">🕯️</span><span class="tc">🕯️</span><span class="tc">🕯️</span>
  </div>
  <div class="title-content">
    <div class="title-hex">⬡</div>
    <h1 class="title-main">HEXHAUS</h1>
    <p class="title-sub">She has lived here for 200 years.<br>She is still here.</p>
    <button class="btn-enter" id="btn-enter">Enter the House</button>
    <p class="title-hint">Drag to look · Click to interact</p>
  </div>
  <div class="title-candles bottom">
    <span class="tc">🕯️</span><span class="tc">🕯️</span><span class="tc">🕯️</span><span class="tc">🕯️</span>
  </div>
</div>

<!-- GAME CANVAS -->
<canvas id="game-canvas" class="hidden"></canvas>

<!-- HUD -->
<div id="hud" class="hidden">
  <div id="hud-top">
    <div id="room-name">The Entrance Hall</div>
    <div id="item-count">0 / 5 items</div>
    <button id="btn-recentre" title="Recentre view (R)">⊕ Recentre</button>
  </div>
  <div id="crosshair">+</div>
  <div id="inventory-bar">
    <div class="inv-label">INVENTORY</div>
    <div id="inv-slots"></div>
  </div>
</div>

<!-- EXAMINE MODAL -->
<div id="examine-modal" class="hidden">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-actions">
      <button class="modal-btn collect" id="modal-collect">Take it</button>
      <button class="modal-btn close" id="modal-close">Leave it</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
<div id="copyright">&copy; 2026 Melanie Mizzi. All rights reserved.</div>
</body>
</html>
