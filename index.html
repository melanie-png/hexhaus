          <stop offset="30%" stop-color="#1a083a"/>
          <stop offset="70%" stop-color="#2d1248"/>
          <stop offset="100%" stop-color="#1a0828"/>

        <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#1a0c08"/>

          <stop offset="100%" stop-color="#050403"/>
        </linearGradient>
        <linearGradient id="ceilingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#060210"/>
          <stop offset="100%" stop-color="#100620"/>
        </linearGradient>
        <!-- Ambient left warm glow (fireplace/candles) -->
        <radialGradient id="ambLeft" cx="18%" cy="55%" r="35%">
          <stop offset="0%" stop-color="#c8601a" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <!-- Ambient right candlelight -->
        <radialGradient id="ambRight" cx="82%" cy="45%" r="28%">
          <stop offset="0%" stop-color="#e8941a" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <!-- Deep purple midzone glow -->
        <radialGradient id="ambMid" cx="50%" cy="40%" r="30%">
          <stop offset="0%" stop-color="#6a20b0" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <!-- Wall panel texture filter -->
        <filter id="roughen">
          <feTurbulence type="fractalNoise" baseFrequency="0.04 0.06" numOctaves="4" seed="2" result="noise"/>
          <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
          <feBlend in="SourceGraphic" in2="grayNoise" mode="soft-light" result="blended"/>
          <feComposite in="blended" in2="SourceGraphic" operator="in"/>
        </filter>
        <filter id="woodGrain">
          <feTurbulence type="turbulence" baseFrequency="0.02 0.8" numOctaves="3" seed="5" result="noise"/>
          <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
          <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
          <feComposite in="blended" in2="SourceGraphic" operator="in"/>
        </filter>
        <filter id="stoneFilter">
          <feTurbulence type="fractalNoise" baseFrequency="0.06 0.04" numOctaves="5" seed="8" result="noise"/>
          <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
          <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
          <feComposite in="blended" in2="SourceGraphic" operator="in"/>
        </filter>
        <filter id="softGlow">
          <feGaussianBlur stdDeviation="8" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="candleGlow">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
